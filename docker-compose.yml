services:
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: pgvector-rag
    restart: unless-stopped
    env_file:
      - path: .env.app
        required: false
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    networks:
      - infra-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ragdb"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgvector_data:

networks:
  infra-net:
    external: true
    name: infra-net
